<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hipster Holiday</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hipsterholiday.com/">
    <meta property="og:title" content="Hipster Holiday">
    <meta property="og:description" content="The countdown is on. The 2nd Friday of December. Every year.">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary">
    <meta property="twitter:url" content="https://hipsterholiday.com/">
    <meta property="twitter:title" content="Hipster Holiday">
    <meta property="twitter:description" content="The countdown is on. The 2nd Friday of December. Every year.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Figtree', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #010310;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .countdown-wrapper {
            text-align: center;
            padding: 32px;
            max-width: 720px;
            width: 100%;
        }

        .brand-title {
            font-weight: 700;
            font-size: 48px;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 64px;
            line-height: 1.2;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }

        .time-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
        }

        .time-value {
            font-weight: 700;
            font-size: 72px;
            line-height: 1;
            letter-spacing: 2px;
            color: #d81e1e;
        }

        .time-label {
            font-weight: 300;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
        }

        .target-date {
            font-weight: 300;
            font-size: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 64px;
        }

        .archive-links {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
        }

        .archive-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            transition: color 0.2s, border-color 0.2s;
        }

        .archive-links a:hover {
            color: #fff;
            border-color: #fff;
        }

        @media (max-width: 600px) {
            .brand-title {
                font-size: 28px;
                letter-spacing: 8px;
                margin-bottom: 48px;
            }

            .countdown {
                gap: 16px;
            }

            .time-unit {
                min-width: 70px;
            }

            .time-value {
                font-size: 48px;
            }

            .time-label {
                font-size: 11px;
                letter-spacing: 3px;
            }

            .target-date {
                font-size: 16px;
                letter-spacing: 3px;
            }
        }
    </style>
</head>
<body>
    <div class="countdown-wrapper">
        <h1 class="brand-title">Hipster Holiday</h1>

        <div class="countdown" id="countdown">
            <div class="time-unit">
                <span class="time-value" id="days">--</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-unit">
                <span class="time-value" id="hours">--</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-unit">
                <span class="time-value" id="minutes">--</span>
                <span class="time-label">Minutes</span>
            </div>
            <div class="time-unit">
                <span class="time-value" id="seconds">--</span>
                <span class="time-label">Seconds</span>
            </div>
        </div>

        <p class="target-date" id="target-date"></p>

        <nav class="archive-links">
            <p>Past events: <a href="/2025/">2025</a></p>
        </nav>
    </div>

    <script>
        function getSecondFridayOfDecember(year) {
            const dec1 = new Date(year, 11, 1);
            const dayOfWeek = dec1.getDay();
            const firstFriday = 1 + ((5 - dayOfWeek + 7) % 7);
            return firstFriday + 7;
        }

        function getNextEventDate() {
            const now = new Date();
            let year = now.getFullYear();
            let day = getSecondFridayOfDecember(year);
            // 6 PM MST = UTC-7 → day at 01:00 UTC next day
            let eventDate = new Date(Date.UTC(year, 11, day + 1, 1, 0, 0));

            if (now >= eventDate) {
                year++;
                day = getSecondFridayOfDecember(year);
                eventDate = new Date(Date.UTC(year, 11, day + 1, 1, 0, 0));
            }

            return { eventDate, year, day };
        }

        function formatDate(day, year) {
            const months = ['January', 'February', 'March', 'April', 'May', 'June',
                            'July', 'August', 'September', 'October', 'November', 'December'];
            return months[11] + ' ' + day + ', ' + year;
        }

        function updateCountdown() {
            const { eventDate, year, day } = getNextEventDate();
            const now = new Date();
            const diff = eventDate - now;

            if (diff <= 0) {
                document.getElementById('days').textContent = '0';
                document.getElementById('hours').textContent = '0';
                document.getElementById('minutes').textContent = '0';
                document.getElementById('seconds').textContent = '0';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = days;
            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;
            document.getElementById('target-date').textContent = formatDate(day, year);
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
